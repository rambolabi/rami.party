<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 11 Update</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../immersive.css">
</head>
<body>
    <div class="container">
        <div class="windows-logo">
            <div class="square"></div>
            <div class="square"></div>
            <div class="square"></div>
            <div class="square"></div>
        </div>
        
        <h1>Working on updates</h1>
        <p class="subtitle">Don't turn off your PC. This will take a while.</p>
        <p class="subtitle">Your PC will restart several times.</p>
        
        <div class="progress-container">
            <div class="progress-text" id="progressText">0% complete</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        
        <div class="status-message" id="statusMessage">Preparing to install updates...</div>
    </div>
    
    <script src="script.js"></script>
    <script src="../immersive.js"></script>
</body>
</html>
