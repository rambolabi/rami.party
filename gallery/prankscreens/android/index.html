<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android System Update</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../immersive.css">
</head>
<body>
    <div class="container">
        <div class="android-logo">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.6 9.48l1.84-3.18c.16-.31.04-.69-.26-.85-.29-.15-.65-.06-.83.22l-1.88 3.24a11.5 11.5 0 0 0-8.94 0L5.65 5.67c-.19-.28-.54-.37-.83-.22-.3.16-.42.54-.26.85l1.84 3.18C2.92 10.88 1 13.94 1 17.36h22c0-3.42-1.92-6.48-5.4-7.88M7 14.5c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1m10 0c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1"/>
            </svg>
        </div>
        
        <h1>System update</h1>
        <p class="update-text">Installing system update...</p>
        
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-percentage" id="progressPercentage">0%</div>
        </div>
        
        <div class="spinner-container">
            <div class="spinner"></div>
        </div>
        
        <div class="warning-text">
            <p>Do not turn off your device</p>
            <p class="small-text">This may take a few minutes</p>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script src="../immersive.js"></script>
</body>
</html>
