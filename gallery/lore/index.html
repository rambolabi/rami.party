<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lore Gallery · rami.party</title>

    <link rel="stylesheet" href="/theme.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

    <meta name="description" content="A living grimoire of magical lore, muggle mischief and impossibly cute creatures.">
    <meta name="author" content="Rami">
    <meta name="theme-color" content="#0b0524">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%9C%3C/text%3E%3C/svg%3E">
</head>

<body>
    <div class="aurora" aria-hidden="true">
        <span class="aurora-blob a1"></span>
        <span class="aurora-blob a2"></span>
        <span class="aurora-blob a3"></span>
    </div>

    <header class="site-header">
        <div class="container">
            <a href="/" class="wordmark" aria-label="rami.party — home">
                <span class="wordmark-spark" aria-hidden="true">✦</span>
                <span class="wordmark-text">RAMI<span class="dot">.</span>PARTY</span>
            </a>
            <a href="/" class="back-home"><span aria-hidden="true">←</span> Back to the playground</a>
        </div>
    </header>

    <main>
        <section class="lore-hero">
            <div class="container">
                <p class="eyebrow"><span aria-hidden="true">🔮</span> An enchanted grimoire <span aria-hidden="true">🔮</span></p>
                <h1 class="lore-title">Lore Gallery</h1>
                <p class="lore-sub">Leaf through pages of magical lore, muggle mischief and impossibly
                    cute creatures. Choose a chapter, or search the archives.</p>

                <div class="category-buttons" role="tablist" aria-label="Gallery categories">
                    <button id="lore-btn" class="active" role="tab" aria-selected="true">📜 Magical Lore</button>
                    <button id="muggle-btn" role="tab" aria-selected="false">😄 Muggle Humor</button>
                    <button id="magic-btn" role="tab" aria-selected="false">✨ Magical Cuteness</button>
                </div>

                <div class="search-container">
                    <input type="text" id="search-bar" placeholder="Discover ancient artifacts…" aria-label="Search the gallery">
                </div>
            </div>
        </section>

        <div class="container">
            <div id="gallery">
                <!-- Images loaded by script.js -->
            </div>
        </div>
    </main>

    <div id="lightbox" class="hidden" role="dialog" aria-modal="true" aria-label="Image viewer">
        <span class="close-btn" role="button" tabindex="0" aria-label="Close">&times;</span>
        <span class="prev-btn" role="button" tabindex="0" aria-label="Previous">&lt;</span>
        <span class="next-btn" role="button" tabindex="0" aria-label="Next">&gt;</span>
        <img id="lightbox-img" src="" alt="Enlarged lore image">
        <div id="lightbox-title"></div>
    </div>

    <script src="img.js"></script>
    <script src="script.js"></script>
</body>

</html>
