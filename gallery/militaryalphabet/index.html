<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Military Phonetic Alphabet // NATO Spelling Code</title>
    <meta name="description" content="Interactive NATO/ICAO military phonetic alphabet reference with a live text-to-phonetic translator. Tap any letter to hear it. Keeps your screen awake while open.">
    <meta name="theme-color" content="#04140a">
    <meta name="color-scheme" content="dark">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%23041209'/%3E%3Ctext x='8' y='12' font-size='11' text-anchor='middle' fill='%2339ff9e' font-family='monospace' font-weight='bold'%3EA%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanlines" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>

    <main class="terminal">
        <header class="term-header">
            <div class="brand">
                <span class="brand-dot" aria-hidden="true"></span>
                <h1 class="term-title">MILITARY PHONETIC ALPHABET</h1>
            </div>
            <button type="button" id="wakeToggle" class="status-pill" aria-pressed="false" title="Toggle screen wake lock">
                <span class="pip" id="wakePip" aria-hidden="true"></span>
                <span id="wakeText">WAKE LOCK: INIT…</span>
            </button>
        </header>

        <p class="intro">
            The <strong>NATO / ICAO</strong> spelling alphabet — spell anything clearly over radio or phone.
            <span class="intro-sub">This screen stays awake while the page is open · tap a tile to hear it.</span>
        </p>

        <section class="translator" aria-label="Text to phonetic translator">
            <div class="field-label"><span class="prompt">&gt;</span> TRANSLATE TEXT → PHONETIC</div>
            <textarea id="input" class="translate-input" rows="2" placeholder="Type a word or message…  e.g. Rami 24" autocomplete="off" spellcheck="false"></textarea>
            <div class="io-actions">
                <button type="button" id="speakBtn" class="btn">▶ SPEAK</button>
                <button type="button" id="copyBtn" class="btn">⧉ COPY</button>
                <button type="button" id="clearBtn" class="btn btn-ghost">✕ CLEAR</button>
            </div>
            <output id="output" class="output" aria-live="polite"></output>
        </section>

        <section class="grid" id="grid" aria-label="Phonetic alphabet tiles"></section>

        <footer class="term-footer">
            <span class="hint">TIP: click a tile to hear &amp; copy · <span id="clock">--:--:--</span></span>
            <span class="blink" aria-hidden="true">█</span>
        </footer>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="script.js"></script>
</body>
</html>
