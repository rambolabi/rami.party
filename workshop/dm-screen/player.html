<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loregate — Player Map</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#07060d">
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%97%BA%EF%B8%8F%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Spectral:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="player.css">
</head>

<body class="player-body">
    <div class="player-stage">
        <header class="player-header">
            <h1 class="player-title" id="title">Loregate</h1>
            <div class="turn-banner" id="turnBanner">
                <span class="turn-swatch" id="turnSwatch"></span>
                <span id="turnName">—</span>
                <span class="round" id="turnRound">Round 1</span>
            </div>
        </header>

        <div class="player-columns">
            <div class="player-map-wrap">
                <div id="mapFrame" class="map-frame">
                    <div id="mapSurface" class="map-layer"></div>
                    <div id="terrainLayer" class="terrain-layer"></div>
                    <div id="mapGrid" class="map-grid on"></div>
                    <div id="itemLayer"></div>
                    <div id="tokenLayer"></div>
                    <div id="fogLayer" class="fog-layer"></div>
                    <div id="nightVeil" class="night-veil"></div>
                    <canvas id="ambientCanvas" class="ambient-canvas"></canvas>
                    <div id="fxLayer"></div>
                </div>
            </div>

            <aside class="party-panel" id="partyPanel">
                <h2 class="panel-title">Party</h2>
                <div id="partyList" class="party-list"></div>
            </aside>
        </div>

        <div class="bottom-row">
            <p class="scene-banner" id="sceneBanner"></p>
            <aside class="inventory-panel" id="inventoryPanel">
                <h2 class="panel-title">🎒 Inventory</h2>
                <div id="inventoryList" class="inventory-list"></div>
            </aside>
        </div>
    </div>

    <div class="idle-hint" id="idleHint">Awaiting the Dungeon Master…</div>

    <div id="dicePopup" class="dice-popup" aria-hidden="true"></div>

    <div id="blackout" class="blackout" aria-hidden="true">
        <span class="blackout-mark">✦</span>
    </div>

    <script src="store.js"></script>
    <script src="ambient.js"></script>
    <script src="player.js"></script>
</body>

</html>
