<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Volume Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #2d3748;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #718096;
            font-size: 1em;
        }

        .controls {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-weight: 600;
            color: #2d3748;
            font-size: 0.9em;
        }

        input[type="file"],
        select {
            padding: 8px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.95em;
            transition: border-color 0.3s;
            cursor: pointer;
        }

        input[type="file"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 0.95em;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #667eea;
        }

        .stat-label {
            color: #718096;
            font-size: 0.9em;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: 700;
            color: #2d3748;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .chart-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 20px;
        }

        .chart-wrapper {
            position: relative;
            height: 350px;
        }

        .table-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }

        .table-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f7fafc;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #2d3748;
            border-bottom: 2px solid #e2e8f0;
            font-size: 0.95em;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            color: #4a5568;
        }

        tbody tr:hover {
            background: #f7fafc;
        }

        .rank-cell {
            font-weight: 600;
            color: #667eea;
            min-width: 40px;
        }

        .email-cell {
            word-break: break-all;
        }

        .count-cell {
            font-weight: 600;
            color: #2d3748;
            text-align: right;
            min-width: 80px;
        }

        .percentage-cell {
            color: #718096;
            text-align: right;
            min-width: 60px;
        }

        .progress-bar {
            background: #e2e8f0;
            height: 6px;
            border-radius: 3px;
            margin-top: 5px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .info-message {
            background: rgba(102, 126, 234, 0.1);
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 6px;
            color: #2d3748;
            margin-bottom: 20px;
            font-size: 0.95em;
        }

        .error-message {
            background: rgba(245, 101, 101, 0.1);
            border-left: 4px solid #f56565;
            padding: 15px;
            border-radius: 6px;
            color: #742a2a;
            margin-bottom: 20px;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #718096;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .control-group {
                width: 100%;
            }

            h1 {
                font-size: 1.5em;
            }

            .chart-wrapper {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📧 Email Volume Analysis Dashboard</h1>
            <p class="subtitle">Visualize email sending patterns by account from Trace Results</p>
        </div>

        <div class="controls">
            <div class="control-group" style="flex: 1; min-width: 200px;">
                <label for="fileInput">Upload Excel/CSV File:</label>
                <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
            </div>
            <div class="control-group">
                <label for="senderColumn">Sender Column:</label>
                <input type="text" id="senderColumn" placeholder="e.g., SenderAddress" value="SenderAddress">
            </div>
            <button onclick="loadFile()">📊 Load &amp; Analyze</button>
        </div>

        <div id="messages"></div>
        <div id="statsSection" style="display: none;">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Unique Accounts</div>
                    <div class="stat-value" id="uniqueAccounts">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Emails Sent</div>
                    <div class="stat-value" id="totalEmails">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Avg Per Account</div>
                    <div class="stat-value" id="avgPerAccount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Max Volume</div>
                    <div class="stat-value" id="maxVolume">0</div>
                </div>
            </div>

            <div class="charts-grid">
                <div class="chart-container">
                    <div class="chart-title">Top 10 Senders</div>
                    <div class="chart-wrapper">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
                <div class="chart-container">
                    <div class="chart-title">Email Distribution</div>
                    <div class="chart-wrapper">
                        <canvas id="pieChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="table-container">
                <div class="table-title">Email Volume by Account</div>
                <table id="detailTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Sender Account</th>
                            <th>Email Count</th>
                            <th>Percentage</th>
                            <th>Volume Indicator</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let barChart = null;
        let pieChart = null;

        async function loadFile() {
            const file = document.getElementById('fileInput').files[0];
            const senderColumn = document.getElementById('senderColumn').value || 'SenderAddress';
            const messagesDiv = document.getElementById('messages');

            messagesDiv.innerHTML = '';

            if (!file) {
                messagesDiv.innerHTML = '<div class="error-message">⚠️ Please select a file first</div>';
                return;
            }

            try {
                let data = [];

                if (file.name.endsWith('.csv')) {
                    data = await parseCSV(file, senderColumn);
                } else if (file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
                    data = await parseExcel(file, senderColumn);
                } else {
                    throw new Error('Unsupported file format. Please use CSV or Excel files.');
                }

                if (data.length === 0) {
                    messagesDiv.innerHTML = '<div class="error-message">❌ No data found. Check your column name.</div>';
                    return;
                }

                displayDashboard(data);
                messagesDiv.innerHTML = '<div class="info-message">✅ Data loaded successfully. Displaying analytics below.</div>';

            } catch (error) {
                messagesDiv.innerHTML = `<div class="error-message">❌ Error: ${error.message}</div>`;
            }
        }

        async function parseCSV(file, senderColumn) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const text = e.target.result;
                        const lines = text.split('\n');
                        const headers = lines[0].split(',').map(h => h.trim());
                        const senderIndex = headers.findIndex(h => h.toLowerCase() === senderColumn.toLowerCase());

                        if (senderIndex === -1) {
                            reject(new Error(`Column "${senderColumn}" not found in CSV`));
                            return;
                        }

                        const data = [];
                        for (let i = 1; i < lines.length; i++) {
                            if (lines[i].trim()) {
                                const parts = lines[i].split(',');
                                if (parts[senderIndex]) {
                                    data.push(parts[senderIndex].trim());
                                }
                            }
                        }
                        resolve(data);
                    } catch (error) {
                        reject(error);
                    }
                };
                reader.readAsText(file);
            });
        }

        async function parseExcel(file, senderColumn) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const script = document.createElement('script');
                        script.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
                        script.onload = () => {
                            const data = new Uint8Array(e.target.result);
                            const workbook = XLSX.read(data, { type: 'array' });
                            const sheet = workbook.Sheets[workbook.SheetNames[0]];
                            const rows = XLSX.utils.sheet_to_json(sheet);

                            const senderIndex = Object.keys(rows[0] || {}).findIndex(
                                h => h.toLowerCase() === senderColumn.toLowerCase()
                            );

                            if (senderIndex === -1) {
                                reject(new Error(`Column "${senderColumn}" not found in Excel`));
                                return;
                            }

                            const senderKey = Object.keys(rows[0])[senderIndex];
                            const senders = rows.map(row => row[senderKey]).filter(Boolean);
                            resolve(senders);
                        };
                        document.head.appendChild(script);
                    } catch (error) {
                        reject(error);
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        }

        function displayDashboard(senderData) {
            const counted = {};
            senderData.forEach(sender => {
                counted[sender] = (counted[sender] || 0) + 1;
            });

            const sorted = Object.entries(counted)
                .map(([sender, count]) => ({ sender, count }))
                .sort((a, b) => b.count - a.count);

            const total = senderData.length;
            const unique = sorted.length;

            document.getElementById('uniqueAccounts').textContent = unique;
            document.getElementById('totalEmails').textContent = total.toLocaleString();
            document.getElementById('avgPerAccount').textContent = (total / unique).toFixed(1);
            document.getElementById('maxVolume').textContent = sorted[0].count;

            // Bar Chart - Top 10
            const top10 = sorted.slice(0, 10);
            const barCtx = document.getElementById('barChart').getContext('2d');
            if (barChart) barChart.destroy();
            barChart = new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels: top10.map(item => item.sender.substring(0, 30) + (item.sender.length > 30 ? '...' : '')),
                    datasets: [{
                        label: 'Emails Sent',
                        data: top10.map(item => item.count),
                        backgroundColor: 'rgba(102, 126, 234, 0.8)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 1,
                        borderRadius: 6,
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            grid: { color: 'rgba(0, 0, 0, 0.05)' }
                        }
                    }
                }
            });

            // Pie Chart - Distribution
            const pieCtx = document.getElementById('pieChart').getContext('2d');
            if (pieChart) pieChart.destroy();
            const colors = generateColors(top10.length);
            pieChart = new Chart(pieCtx, {
                type: 'doughnut',
                data: {
                    labels: top10.map(item => item.sender.substring(0, 20) + (item.sender.length > 20 ? '...' : '')),
                    datasets: [{
                        data: top10.map(item => item.count),
                        backgroundColor: colors,
                        borderColor: 'white',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: { font: { size: 11 } }
                        }
                    }
                }
            });

            // Table
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            sorted.forEach((item, index) => {
                const percentage = ((item.count / total) * 100).toFixed(2);
                const barWidth = (item.count / sorted[0].count) * 100;
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="rank-cell">${index + 1}</td>
                    <td class="email-cell">${escapeHtml(item.sender)}</td>
                    <td class="count-cell">${item.count.toLocaleString()}</td>
                    <td class="percentage-cell">${percentage}%</td>
                    <td>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${barWidth}%"></div>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('statsSection').style.display = 'block';
        }

        function generateColors(count) {
            const colors = [
                '#667eea', '#764ba2', '#f093fb', '#4facfe',
                '#43e97b', '#fa709a', '#30cfd0', '#330867',
                '#a8edea', '#fed6e3'
            ];
            const result = [];
            for (let i = 0; i < count; i++) {
                result.push(colors[i % colors.length]);
            }
            return result;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
