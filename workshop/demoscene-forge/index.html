<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Demoscene video & music generator — create short retro-futuristic visuals and chiptune-style audio right in your browser." />
  <title>DEMOFORGE // Video &amp; Music Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- ============ CONTROL PANEL ============ -->
    <aside id="panel" aria-label="Control panel">
      <header class="panel-head">
        <h1 class="logo"><span class="glitch" data-text="DEMOFORGE">DEMOFORGE</span></h1>
        <p class="tagline">// video &amp; music generator</p>
      </header>

      <div class="panel-scroll">
        <!-- ---- BASIC ---- -->
        <section class="group" data-open="true">
          <button class="group-head" type="button" aria-expanded="true">
            <span class="chev">▹</span> BASIC
          </button>
          <div class="group-body">
            <label class="ctl">
              <span>Shape</span>
              <select id="shape">
                <option value="random">Random</option>
                <option value="square">Square</option>
                <option value="circle" selected>Circle</option>
                <option value="triangle">Triangle</option>
                <option value="star">Star</option>
                <option value="hexagon">Hexagon</option>
                <option value="ring">Ring</option>
              </select>
            </label>

            <label class="ctl">
              <span>Movement</span>
              <select id="movement">
                <option value="still">Still / Static</option>
                <option value="rotate">Rotating</option>
                <option value="linear">Linear</option>
                <option value="bounce" selected>Bouncing (corner collision)</option>
                <option value="spiral">Spiral / Orbital</option>
                <option value="wave">Wave</option>
                <option value="particles">Particle field</option>
              </select>
            </label>

            <label class="ctl">
              <span>Count <b id="countVal">24</b></span>
              <input id="count" type="range" min="1" max="200" value="24" />
            </label>

            <label class="ctl">
              <span>Size <b id="sizeVal">40</b></span>
              <input id="size" type="range" min="4" max="200" value="40" />
            </label>

            <label class="ctl">
              <span>Speed <b id="speedVal">1.0</b></span>
              <input id="speed" type="range" min="0" max="500" value="100" />
            </label>

            <label class="ctl toggle">
              <input id="shapeCycle" type="checkbox" />
              <span>Object shape-cycle (morph shapes)</span>
            </label>
            <label class="ctl">
              <span>Cycle speed <b id="shapeCycleSpeedVal">1.0</b></span>
              <input id="shapeCycleSpeed" type="range" min="1" max="100" value="20" />
            </label>

            <label class="ctl toggle">
              <input id="pulse" type="checkbox" />
              <span>Size pulse (beat/throb)</span>
            </label>
            <label class="ctl">
              <span>Spread <b id="spreadVal">1.0</b></span>
              <input id="spread" type="range" min="10" max="200" value="100" />
            </label>
          </div>
        </section>

        <!-- ---- VISUAL ---- -->
        <section class="group" data-open="true">
          <button class="group-head" type="button" aria-expanded="true">
            <span class="chev">▹</span> VISUAL
          </button>
          <div class="group-body">
            <div class="ctl-row">
              <label class="ctl half">
                <span>Object</span>
                <input id="objColor" type="color" value="#00ffd5" />
              </label>
              <label class="ctl half">
                <span>Object 2 (gradient)</span>
                <input id="objColor2" type="color" value="#ff00a8" />
              </label>
            </div>

            <label class="ctl">
              <span>Object opacity <b id="objAlphaVal">0.85</b></span>
              <input id="objAlpha" type="range" min="0" max="100" value="85" />
            </label>

            <div class="ctl-row">
              <label class="ctl half">
                <span>Background</span>
                <input id="bgColor" type="color" value="#05010f" />
              </label>
              <label class="ctl half">
                <span>Background 2</span>
                <input id="bgColor2" type="color" value="#12002e" />
              </label>
            </div>

            <label class="ctl toggle">
              <input id="bgGradient" type="checkbox" checked />
              <span>Background gradient</span>
            </label>

            <label class="ctl toggle">
              <input id="grid" type="checkbox" checked />
              <span>Grid display</span>
            </label>

            <label class="ctl">
              <span>Grid size <b id="gridSizeVal">40</b></span>
              <input id="gridSize" type="range" min="8" max="160" value="40" />
            </label>

            <label class="ctl toggle">
              <input id="gridAnim" type="checkbox" checked />
              <span>Grid animation (morph &amp; shift)</span>
            </label>

            <label class="ctl toggle">
              <input id="outline" type="checkbox" />
              <span>Object outline / stroke</span>
            </label>
            <label class="ctl">
              <span>Outline width <b id="outlineWidthVal">2</b></span>
              <input id="outlineWidth" type="range" min="1" max="20" value="2" />
            </label>

            <label class="ctl">
              <span>Blend mode</span>
              <select id="blend">
                <option value="auto" selected>Auto (glow-aware)</option>
                <option value="source-over">Normal</option>
                <option value="lighter">Additive</option>
                <option value="screen">Screen</option>
                <option value="multiply">Multiply</option>
                <option value="difference">Difference</option>
                <option value="exclusion">Exclusion</option>
                <option value="overlay">Overlay</option>
                <option value="hard-light">Hard light</option>
              </select>
            </label>

            <label class="ctl toggle">
              <input id="starfield" type="checkbox" />
              <span>Starfield background</span>
            </label>
          </div>
        </section>

        <!-- ---- EFFECTS ---- -->
        <section class="group" data-open="true">
          <button class="group-head" type="button" aria-expanded="true">
            <span class="chev">▹</span> EFFECTS
          </button>
          <div class="group-body">
            <label class="ctl toggle">
              <input id="colorCycle" type="checkbox" checked />
              <span>Color cycling</span>
            </label>
            <label class="ctl toggle">
              <input id="glow" type="checkbox" checked />
              <span>Glow / bloom</span>
            </label>
            <label class="ctl toggle">
              <input id="scanlines" type="checkbox" checked />
              <span>Scanlines</span>
            </label>
            <label class="ctl toggle">
              <input id="crt" type="checkbox" checked />
              <span>CRT vignette</span>
            </label>
            <label class="ctl toggle">
              <input id="plasma" type="checkbox" />
              <span>Plasma background</span>
            </label>
            <label class="ctl toggle">
              <input id="kaleidoscope" type="checkbox" />
              <span>Kaleidoscope mirror</span>
            </label>
            <label class="ctl">
              <span>Kaleidoscope slices <b id="kaleidoVal">6</b></span>
              <input id="kaleidoSlices" type="range" min="2" max="16" value="6" />
            </label>
            <label class="ctl toggle">
              <input id="trails" type="checkbox" checked />
              <span>Motion trails</span>
            </label>
            <label class="ctl">
              <span>Trail persistence <b id="trailVal">0.15</b></span>
              <input id="trail" type="range" min="1" max="95" value="15" />
            </label>
            <label class="ctl toggle">
              <input id="distortion" type="checkbox" />
              <span>Sine distortion / swirl</span>
            </label>
            <label class="ctl toggle">
              <input id="chromatic" type="checkbox" />
              <span>Chromatic aberration (RGB split)</span>
            </label>
            <label class="ctl toggle">
              <input id="pixelate" type="checkbox" />
              <span>Pixelate / mosaic</span>
            </label>
            <label class="ctl">
              <span>Pixel size <b id="pixelSizeVal">6</b></span>
              <input id="pixelSize" type="range" min="2" max="40" value="6" />
            </label>
            <label class="ctl toggle">
              <input id="invert" type="checkbox" />
              <span>Invert colors</span>
            </label>
            <label class="ctl toggle">
              <input id="posterize" type="checkbox" />
              <span>Posterize (color banding)</span>
            </label>
            <label class="ctl toggle">
              <input id="vhs" type="checkbox" />
              <span>VHS tracking noise</span>
            </label>

            <label class="ctl">
              <span>Camera zoom pulse <b id="camZoomVal">0.0</b></span>
              <input id="camZoom" type="range" min="0" max="100" value="0" />
            </label>
            <label class="ctl">
              <span>Camera rotation <b id="camRotVal">0.0</b></span>
              <input id="camRot" type="range" min="0" max="100" value="0" />
            </label>
          </div>
        </section>

        <!-- ---- AUDIO ---- -->
        <section class="group" data-open="true">
          <button class="group-head" type="button" aria-expanded="true">
            <span class="chev">▹</span> AUDIO
          </button>
          <div class="group-body">
            <label class="ctl toggle">
              <input id="audioOn" type="checkbox" checked />
              <span>Generate music</span>
            </label>
            <label class="ctl">
              <span>Tempo (BPM) <b id="bpmVal">120</b></span>
              <input id="bpm" type="range" min="60" max="200" value="120" />
            </label>
            <label class="ctl">
              <span>Scale</span>
              <select id="scale">
                <option value="minor">Minor (moody)</option>
                <option value="major">Major (bright)</option>
                <option value="pentatonic" selected>Pentatonic</option>
                <option value="phrygian">Phrygian (dark)</option>
              </select>
            </label>
            <label class="ctl">
              <span>Waveform</span>
              <select id="waveform">
                <option value="square" selected>Square (chip)</option>
                <option value="sawtooth">Saw</option>
                <option value="triangle">Triangle</option>
                <option value="sine">Sine</option>
              </select>
            </label>

            <label class="ctl">
              <span>Root note</span>
              <select id="root">
                <option value="0">A</option>
                <option value="1">A#</option>
                <option value="2">B</option>
                <option value="3" selected>C</option>
                <option value="4">C#</option>
                <option value="5">D</option>
                <option value="6">D#</option>
                <option value="7">E</option>
                <option value="8">F</option>
                <option value="9">F#</option>
                <option value="10">G</option>
                <option value="11">G#</option>
              </select>
            </label>
            <label class="ctl">
              <span>Pattern steps <b id="stepsVal">16</b></span>
              <input id="steps" type="range" min="4" max="32" value="16" />
            </label>
            <label class="ctl">
              <span>Note density <b id="densityVal">0.65</b></span>
              <input id="density" type="range" min="0" max="100" value="65" />
            </label>
            <label class="ctl">
              <span>Octave range <b id="octaveVal">2</b></span>
              <input id="octave" type="range" min="1" max="4" value="2" />
            </label>

            <label class="ctl">
              <span>Arp pattern</span>
              <select id="arpPattern">
                <option value="off">Off</option>
                <option value="up" selected>Up</option>
                <option value="down">Down</option>
                <option value="updown">Up / Down</option>
                <option value="random">Random</option>
              </select>
            </label>
            <label class="ctl">
              <span>Arp speed <b id="arpSpeedVal">2</b></span>
              <input id="arpSpeed" type="range" min="1" max="4" value="2" />
            </label>

            <div class="ctl-row">
              <label class="ctl toggle half">
                <input id="drums" type="checkbox" checked />
                <span>Kick</span>
              </label>
              <label class="ctl toggle half">
                <input id="snare" type="checkbox" checked />
                <span>Snare</span>
              </label>
            </div>
            <div class="ctl-row">
              <label class="ctl toggle half">
                <input id="hats" type="checkbox" checked />
                <span>Hi-hats</span>
              </label>
              <label class="ctl toggle half">
                <input id="bass" type="checkbox" checked />
                <span>Bassline</span>
              </label>
            </div>
            <label class="ctl toggle">
              <input id="pads" type="checkbox" />
              <span>Chord pads</span>
            </label>
            <label class="ctl toggle">
              <input id="evolve" type="checkbox" />
              <span>Evolving melody (mutates)</span>
            </label>

            <label class="ctl">
              <span>Swing <b id="swingVal">0.0</b></span>
              <input id="swing" type="range" min="0" max="70" value="0" />
            </label>
            <label class="ctl">
              <span>Filter cutoff <b id="cutoffVal">1.0</b></span>
              <input id="cutoff" type="range" min="5" max="100" value="100" />
            </label>
            <label class="ctl">
              <span>Filter LFO sweep <b id="filterLfoVal">0.0</b></span>
              <input id="filterLfo" type="range" min="0" max="100" value="0" />
            </label>
            <label class="ctl">
              <span>Vibrato <b id="vibratoVal">0.0</b></span>
              <input id="vibrato" type="range" min="0" max="100" value="0" />
            </label>
            <label class="ctl">
              <span>Bitcrush <b id="bitcrushVal">0.0</b></span>
              <input id="bitcrush" type="range" min="0" max="100" value="0" />
            </label>
            <label class="ctl toggle">
              <input id="echo" type="checkbox" />
              <span>Echo / delay</span>
            </label>
            <label class="ctl">
              <span>Echo amount <b id="echoAmtVal">0.30</b></span>
              <input id="echoAmt" type="range" min="0" max="90" value="30" />
            </label>

            <label class="ctl toggle">
              <input id="audioReactive" type="checkbox" checked />
              <span>Audio-reactive visuals</span>
            </label>
            <label class="ctl">
              <span>Master volume <b id="volVal">0.5</b></span>
              <input id="vol" type="range" min="0" max="100" value="50" />
            </label>
          </div>
        </section>

        <!-- ---- ADVANCED ---- -->
        <section class="group" data-open="false">
          <button class="group-head" type="button" aria-expanded="false">
            <span class="chev">▹</span> ADVANCED
          </button>
          <div class="group-body">
            <label class="ctl">
              <span>Output resolution</span>
              <select id="resolution">
                <option value="640x360">640 × 360</option>
                <option value="854x480">854 × 480</option>
                <option value="1280x720" selected>1280 × 720</option>
                <option value="1920x1080">1920 × 1080</option>
                <option value="1080x1080">1080 × 1080 (square)</option>
              </select>
            </label>
            <label class="ctl">
              <span>Recording length (s) <b id="durVal">10</b></span>
              <input id="dur" type="range" min="2" max="60" value="10" />
            </label>
            <label class="ctl">
              <span>Video seed</span>
              <span class="seed-row">
                <input id="videoSeed" type="text" value="demoforge" spellcheck="false" />
                <button id="videoSeedDice" class="seed-dice" type="button" title="Roll a new video seed" aria-label="Roll a new video seed">🎲</button>
              </span>
            </label>
            <label class="ctl">
              <span>Audio seed</span>
              <span class="seed-row">
                <input id="audioSeed" type="text" value="demoforge" spellcheck="false" />
                <button id="audioSeedDice" class="seed-dice" type="button" title="Roll a new audio seed" aria-label="Roll a new audio seed">🎲</button>
              </span>
            </label>
            <p class="seed-hint">Same seeds → same result. Type any word or number, or roll 🎲. Video and audio are independent.</p>
            <label class="ctl toggle">
              <input id="livePreview" type="checkbox" checked />
              <span>View creation live (overlay)</span>
            </label>
            <label class="ctl toggle secret">
              <input id="removeWatermark" type="checkbox" />
              <span>Remove watermark</span>
            </label>
            <label class="ctl toggle secret hidden-egg" id="chaosCtl">
              <input id="chaos" type="checkbox" />
              <span>⚡ CHAOS MODE ⚡</span>
            </label>
            <p class="egg-hint">psst… try these video seeds: <i>matrix, vaporwave, c64, amiga, rainbow, demo</i></p>
          </div>
        </section>
      </div>

      <!-- ---- ACTION BAR ---- -->
      <div class="actions">
        <div class="btn-row">
          <button id="playBtn" class="btn primary" type="button">▶ Play</button>
          <button id="randomBtn" class="btn" type="button">⚄ Randomize</button>
          <button id="fullscreenBtn" class="btn" type="button">⛶ Fullscreen</button>
        </div>
        <div class="btn-row">
          <button id="recVideoBtn" class="btn" type="button">● Export Video</button>
          <button id="recAudioBtn" class="btn" type="button">♪ Export Audio</button>
        </div>
        <div class="btn-row">
          <button id="exportJsonBtn" class="btn ghost" type="button">↓ Save Preset</button>
          <button id="importJsonBtn" class="btn ghost" type="button">↑ Load Preset</button>
          <input id="importFile" type="file" accept="application/json" hidden />
        </div>
        <p id="status" class="status" role="status" aria-live="polite">Ready.</p>
      </div>
    </aside>

    <!-- ============ STAGE ============ -->
    <main id="stage">
      <canvas id="scene"></canvas>
      <div id="watermark" class="watermark">A compyra.com project</div>
      <button id="fsDice" class="fs-dice" type="button" title="Randomize" aria-label="Randomize">🎲</button>
      <div id="recDot" class="rec-dot" hidden>● REC</div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
