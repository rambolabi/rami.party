<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vergeten je computer te vergrendelen? Stuur een grappige 'ik trakteer' mail. NL/EN/FR.">
    <title>BBQ E-mail</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="terminal-bg">
    <div class="terminal-window">
        <div class="terminal-header">
            <span class="prompt-title">bbq-mailer:~$</span>
            <span class="prompt-blink">█</span>
            <div class="header-tools">
                <div class="lang-switcher" role="group" aria-label="Taal / Language / Langue">
                    <button class="lang-btn" data-lang="nl" aria-pressed="true">NL</button>
                    <button class="lang-btn" data-lang="en" aria-pressed="false">EN</button>
                    <button class="lang-btn" data-lang="fr" aria-pressed="false">FR</button>
                </div>
                <button id="themeToggle" class="theme-toggle" title="Thema" aria-label="Thema">🌙</button>
            </div>
        </div>

        <div class="terminal-body">
            <div class="terminal-intro">
                <span data-i18n="introLine1">Computer Vergeten Te Vergrendelen?</span><br>
                <span data-i18n="introLine2">Tijd om een grappige mail te sturen!</span>
            </div>

            <div class="terminal-section">
                <span class="section-label" data-i18n="recipientsLabel"># Verstuur naar (selecteer één of meerdere):</span>
                <div class="checkbox-group">
                    <label class="checkbox-option">
                        <input type="checkbox" name="sendTo" value="bbq">
                        <span>BBQ@lebon.info <small data-i18n="bbqRecipientDesc">(Ik tel anoniem hoeveel mensen hun computer niet vergrendelen)</small></span>
                    </label>

                    <label class="checkbox-option">
                        <input type="checkbox" name="sendTo" value="custom">
                        <span data-i18n="customEmailLabel">Eigen e-mailadres:</span>
                        <input type="email" id="customEmail" placeholder="naam@voorbeeld.be">
                    </label>

                    <div id="recommendedEmails"></div>
                </div>
            </div>

            <div class="terminal-section">
                <div class="section-header">
                    <span class="section-label" data-i18n="chooseEmailLabel"># Kies je prank e-mail:</span>
                    <button id="randomEmailBtn" class="random-btn" data-i18n="randomBtn">🎲 Random</button>
                </div>
                <div class="search-wrap">
                    <input type="search" id="templateSearch" class="search-input" data-i18n-attr="placeholder:searchPlaceholder" placeholder="Zoek een e-mail...">
                </div>
                <div class="email-templates" id="emailTemplates"></div>
                <p class="no-results" id="noResults" hidden data-i18n="noResults">Geen e-mail gevonden.</p>
            </div>

            <div class="terminal-section preview-section">
                <span class="section-label" data-i18n="previewTitle"># Voorbeeld van de e-mail:</span>
                <div class="preview-panel" id="previewPanel">
                    <p class="preview-empty" id="previewEmpty" data-i18n="previewEmpty">Selecteer hierboven een e-mail om het voorbeeld te zien.</p>
                    <div class="preview-content" id="previewContent" hidden>
                        <div class="preview-row">
                            <span class="preview-key" data-i18n="previewTo">Aan:</span>
                            <span class="preview-val" id="previewTo"></span>
                        </div>
                        <div class="preview-row">
                            <span class="preview-key" data-i18n="previewSubject">Onderwerp:</span>
                            <span class="preview-val" id="previewSubject"></span>
                        </div>
                        <label class="preview-key preview-body-label" for="previewBody" data-i18n="previewBody">Bericht (aanpasbaar):</label>
                        <textarea id="previewBody" class="preview-body" rows="12" spellcheck="false"></textarea>
                        <div class="preview-actions">
                            <button id="sendBtn" class="action-btn action-primary" data-i18n="sendBtn">📧 Openen in mail</button>
                            <button id="copyBtn" class="action-btn" data-i18n="copyBtn">📋 Kopiëren</button>
                            <span id="copyFeedback" class="copy-feedback" hidden data-i18n="copiedMsg">Gekopieerd!</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
