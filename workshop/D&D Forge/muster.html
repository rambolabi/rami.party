<!DOCTYPE html>
<html lang="en" data-theme="parchment">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="description" content="D&D Forge — DM Muster. Paste your players' character codes to see the whole party in one overview, with warnings for anyone who ignored your Charter.">
    <title>D&D Forge — DM Muster</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9B%A1%EF%B8%8F%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="pm-wrap" style="padding:clamp(12px,3vw,28px)">
        <div class="muster-head">
            <h1>🛡️ DM Muster</h1>
            <p>Assemble your whole party in one screen. Paste each player’s <b>muster code</b> or share link below —
               anyone who didn’t build with your Charter is flagged.</p>
            <p><a class="link-btn" href="index.html">← Back to the Forge</a></p>
        </div>

        <div class="muster-io">
            <div>
                <label class="fld">Your DM Charter link <span style="color:var(--ink-dim);font-weight:400">(optional — enables mismatch warnings)</span></label>
                <input type="text" id="charterInput" placeholder="Paste the #charter=… link you gave your players">
                <div id="charterInfo" class="edition-note" style="text-align:left;margin-top:6px"></div>
            </div>
            <div>
                <label class="fld">Player codes / links — one per line</label>
                <textarea id="codesInput" placeholder="Paste each hero’s muster code or link here, one per line…"></textarea>
            </div>
            <div class="btn-row" style="margin-top:0">
                <button class="btn btn-primary" id="assembleBtn">⚔️ Assemble party</button>
                <button class="btn" id="clearBtn">Clear</button>
                <span class="site-count" id="partyCount" style="align-self:center;margin-left:auto;color:var(--ink-dim);font-size:.85em"></span>
            </div>
        </div>

        <div class="party-board" id="board"></div>
    </div>

    <div class="toast-wrap" id="toastWrap" aria-live="polite"></div>

    <script src="js/data/core.js"></script>
    <script src="js/data/editions.js"></script>
    <script src="js/data/races.js"></script>
    <script src="js/data/classes.js"></script>
    <script src="js/data/backgrounds.js"></script>
    <script src="js/data/weapons.js"></script>
    <script src="js/data/armor.js"></script>
    <script src="js/data/spells.js"></script>
    <script src="js/data/feats.js"></script>
    <script src="js/data/story.js"></script>
    <script src="js/data/gear.js"></script>
    <script src="js/data.js"></script>
    <script src="js/muster.js"></script>
</body>
</html>
