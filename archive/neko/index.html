<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue-Haired Chibi Neko Girls 🐱💙</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%90%B1%3C/text%3E%3C/svg%3E">
    <style>
        /* rami.party relic chrome */
        .relic-back {
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 2000;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Quicksand', system-ui, sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            color: #2c1a4d;
            text-decoration: none;
            padding: 9px 16px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
            transition: transform 0.25s ease, background 0.25s ease;
        }
        .relic-back:hover { transform: translateX(-3px); background: #fff; }
        .relic-tag {
            position: fixed;
            top: 16px;
            right: 14px;
            z-index: 2000;
            font-family: 'Quicksand', system-ui, sans-serif;
            font-size: 0.72rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.85);
            background: rgba(0, 0, 0, 0.25);
            padding: 6px 12px;
            border-radius: 999px;
        }
    </style>
</head>
<body>
    <a href="/archive/" class="relic-back">← Back to the Wastelands</a>
    <span class="relic-tag" aria-hidden="true">☄️ Archived relic</span>
    <div class="title-container collapsed">
        <h1>✨ Chibi Neko Paradise ✨ <button id="collapseBtn" class="collapse-btn">▼</button></h1>
        <div class="collapsible-content">
            <p>Drag the neko girls around! They'll bounce and play! 🎉</p>
            <p style="font-size: 0.9em; color: #666;">
                💙 Blue Nekos | 🌸 Pink Shy Nekos (run away!) | 🧡 Orange Friendly Nekos (seek love!) | 🖤 Goth Nekos | 🦦 Rare Ferrets!
            </p>
            <p class="neko-counter" style="font-size: 1.1em; font-weight: bold; color: #ff6600;">
                Nekos: <span id="nekoCount">0</span><span id="ferretCount" style="display: none;"> (🦦 <span id="ferretNum">0</span>)</span> / 42 ⚔️
            </p>
            <div class="button-group">
                <button id="addNeko">Add More Nekos! 😸</button>
                <button id="partyMode">🎊 PARTY MODE 🎊</button>
                <button id="eliminateBtn">🎯 Eliminate</button>
            </div>
        </div>
    </div>

    <div id="playground">
        <!-- Neko girls will appear here -->
    </div>

    <script src="script.js"></script>
</body>
</html>
